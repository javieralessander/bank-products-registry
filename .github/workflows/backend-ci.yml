name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "Backend/**"
      - "Dockerfile"
      - "railway.toml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "Backend/**"
      - "Dockerfile"
      - "railway.toml"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build:
    name: Compilar backend
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restaurar dependencias
        run: dotnet restore Backend/BankProductsRegistry.Api/BankProductsRegistry.Api.csproj

      - name: Compilar proyecto
        run: dotnet build Backend/BankProductsRegistry.Api/BankProductsRegistry.Api.csproj --configuration Release --no-restore

      - name: Verificar build de imagen Docker (mismo contexto que Railway)
        run: docker build -f Dockerfile -t bank-products-api-ci .
